<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Final - Overview Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .dash-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .dash-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .dash-card h3 {
            margin-top: 0;
            font-size: 1.25rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .dash-card .stat {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 1rem 0 0.5rem 0;
            color: var(--text-main);
        }
        .dash-card .progress-bar {
            height: 6px;
            border-radius: 3px;
            margin-bottom: 1.5rem;
        }
        .dash-card p {
            color: var(--text-muted);
            margin: 0;
        }
        .dash-type-breakdown {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .type-pill {
            background: rgba(255,255,255,0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
        }
        .btn-jump {
            margin-top: 1.5rem;
            text-align: center;
            text-decoration: none;
            background: var(--primary);
            color: #fff;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
        }
        .btn-jump:hover { background: var(--accent); }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar no-print" id="sidebar">
            <div class="brand">
                <h1>Platform Final</h1>
                <p>Unified Learning Dashboard</p>
            </div>

            <!-- Tab Navigation -->
            <nav aria-label="Module navigation" class="nav-links">
                <a href="index.html" class="nav-link active">🏠 Overview</a>
                <a href="exercises/index.html" class="nav-link">📚 Exercises</a>
                <a href="questions_bank/index.html" class="nav-link">🏦 Questions Bank</a>
                <a href="exams/index.html" class="nav-link">📝 Exams</a>
                <a href="quiz/index.html" class="nav-link">🎓 Final Quiz</a>
            </nav>

            <div class="progress-container" style="margin-top: 2rem;">
                <div class="progress-header">
                    <span>Global Progress</span>
                    <span id="progress-text">0 / 0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            
            <div id="session-counter" class="session-counter" style="margin: 1rem 1.5rem; font-size: 0.9rem;">
                🌟 Session: <strong id="session-count" style="color: var(--accent);">0</strong> completed
            </div>

            <div class="sidebar-actions" style="margin-top: auto;">
                <button class="btn btn-outline" onclick="exportProgress()" style="width: 100%; margin-bottom: 0.5rem;">⇣ Export Progress</button>
                <label class="btn btn-outline import-label" style="display: block; text-align: center;">
                    ⇡ Import Progress
                    <input type="file" accept=".json" style="display:none" onchange="importProgress(this)">
                </label>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header no-print">
                <h2 id="page-title">Welcome to Your Learning Platform</h2>
            </div>
            
            <div id="dashboard-container" class="dashboard-grid">
                <!-- Generated by dashboard.js -->
            </div>
        </main>
    </div>

    <button class="sidebar-toggle no-print" id="sidebar-toggle" onclick="toggleMobileSidebar()" aria-label="Toggle sidebar menu">☰</button>

    <!-- Load all data scripts -->
    <script src="exercises/data.js"></script>
    <script src="questions_bank/data.js"></script>
    <script src="exams/data.js"></script>
    <script src="quiz/data.js"></script>
    
    <!-- Load Core and Dashboard Logic -->
    <script src="shared/core.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
